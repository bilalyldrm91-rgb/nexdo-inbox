<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nexdo Inbox</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#F3F4F6;color:#111827;min-height:100vh;font-size:14px;}
.app{display:flex;height:100vh;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:220px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;flex-shrink:0;}
.sb-logo{padding:16px;font-size:17px;font-weight:700;color:#5B5FEF;border-bottom:1px solid #E5E7EB;}
.sb-ws{padding:10px 12px;border-bottom:1px solid #E5E7EB;}
.ws-select{width:100%;padding:7px 10px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:12px;color:#111827;background:#F9FAFB;cursor:pointer;font-family:inherit;}
.sb-section{padding:10px 14px 4px;font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.7px;}
.sb-item{display:flex;align-items:center;gap:8px;padding:8px 14px;font-size:13px;color:#6B7280;cursor:pointer;border-radius:0;transition:all 0.1s;}
.sb-item:hover{background:#F9FAFB;color:#111827;}
.sb-item.active{background:#EEEEFF;color:#5B5FEF;font-weight:500;}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.sb-badge{margin-left:auto;background:#EF4444;color:#fff;border-radius:10px;padding:1px 6px;font-size:10px;font-weight:600;}
.sb-bottom{margin-top:auto;border-top:1px solid #E5E7EB;padding:12px 14px;}
.sb-user{display:flex;align-items:center;gap:8px;font-size:12px;}
.sb-av{width:28px;height:28px;border-radius:50%;background:#EEEEFF;color:#5B5FEF;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}
.sb-name{font-weight:500;color:#111827;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sb-role{color:#9CA3AF;font-size:11px;}
.logout-btn{width:100%;margin-top:8px;padding:7px;border:1px solid #E5E7EB;border-radius:8px;background:none;font-size:12px;color:#6B7280;cursor:pointer;font-family:inherit;}
.logout-btn:hover{background:#FEE2E2;color:#B91C1C;border-color:#FECACA;}

/* INBOX LIST */
.inbox-col{width:280px;background:#fff;border-right:1px solid #E5E7EB;display:flex;flex-direction:column;flex-shrink:0;}
.inbox-header{padding:14px 16px;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;justify-content:space-between;}
.inbox-title{font-size:15px;font-weight:600;color:#111827;}
.inbox-count{font-size:12px;color:#9CA3AF;}
.inbox-search{padding:8px 12px;border-bottom:1px solid #E5E7EB;}
.inbox-search input{width:100%;padding:7px 12px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:12px;outline:none;background:#F9FAFB;font-family:inherit;}
.inbox-search input:focus{border-color:#5B5FEF;}
.inbox-filters{display:flex;gap:4px;padding:8px 12px;border-bottom:1px solid #E5E7EB;overflow-x:auto;}
.filter-pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;border:1px solid #E5E7EB;background:#fff;color:#6B7280;cursor:pointer;white-space:nowrap;font-family:inherit;}
.filter-pill.active{background:#5B5FEF;color:#fff;border-color:#5B5FEF;}
.inbox-list{flex:1;overflow-y:auto;}
.conv-item{padding:12px 16px;border-bottom:1px solid #F3F4F6;cursor:pointer;transition:background 0.1s;}
.conv-item:hover{background:#F9FAFB;}
.conv-item.active{background:#EEEEFF;}
.conv-top{display:flex;align-items:center;gap:8px;margin-bottom:4px;}
.conv-av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.conv-info{flex:1;min-width:0;}
.conv-name{font-size:13px;font-weight:500;color:#111827;display:flex;justify-content:space-between;}
.conv-time{font-size:10px;color:#9CA3AF;font-weight:400;}
.conv-preview{font-size:12px;color:#6B7280;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.conv-meta{display:flex;align-items:center;gap:4px;margin-top:4px;}
.ch-tag{font-size:10px;padding:1px 6px;border-radius:4px;font-weight:500;}
.ch-wa{background:#DCFCE7;color:#166534;}
.ch-ig{background:#FCE7F3;color:#9D174D;}
.ch-mail{background:#FEE2E2;color:#991B1B;}
.unread{width:7px;height:7px;border-radius:50%;background:#5B5FEF;margin-left:auto;}
.empty-state{padding:40px 20px;text-align:center;color:#9CA3AF;}
.empty-icon{font-size:32px;margin-bottom:8px;}

/* CHAT AREA */
.chat-col{flex:1;display:flex;flex-direction:column;min-width:0;}
.chat-header{padding:14px 20px;background:#fff;border-bottom:1px solid #E5E7EB;display:flex;align-items:center;gap:12px;}
.chat-av{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;}
.chat-info{flex:1;}
.chat-name{font-size:15px;font-weight:600;color:#111827;}
.chat-sub{font-size:12px;color:#9CA3AF;}
.chat-actions{display:flex;gap:6px;}
.act-btn{padding:6px 14px;border:1.5px solid #E5E7EB;border-radius:8px;font-size:12px;cursor:pointer;background:#fff;color:#6B7280;font-family:inherit;font-weight:500;}
.act-btn:hover{background:#F9FAFB;}
.act-btn.resolve{background:#DCFCE7;border-color:#DCFCE7;color:#166534;}
.chat-msgs{flex:1;padding:20px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;background:#F9FAFB;}
.msg-wrap{display:flex;gap:8px;align-items:flex-end;}
.msg-wrap.out{flex-direction:row-reverse;}
.msg-av{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0;}
.msg-bubble{max-width:60%;padding:10px 14px;border-radius:14px;font-size:13px;line-height:1.5;}
.msg-wrap:not(.out) .msg-bubble{background:#fff;border:1px solid #E5E7EB;color:#111827;border-bottom-left-radius:4px;}
.msg-wrap.out .msg-bubble{background:#5B5FEF;color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:10px;color:#9CA3AF;margin-top:3px;}
.msg-wrap.out .msg-time{text-align:right;}
.chat-input{padding:16px 20px;background:#fff;border-top:1px solid #E5E7EB;display:flex;gap:10px;align-items:flex-end;}
.chat-input textarea{flex:1;padding:10px 14px;border:1.5px solid #E5E7EB;border-radius:10px;font-size:13px;resize:none;outline:none;font-family:inherit;line-height:1.5;}
.chat-input textarea:focus{border-color:#5B5FEF;}
.send-btn{padding:10px 20px;background:#5B5FEF;color:#fff;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;}
.send-btn:hover{background:#4A4ED8;}
.no-conv{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#9CA3AF;background:#F9FAFB;}
.no-conv-icon{font-size:48px;}

/* INFO COL */
.info-col{width:220px;background:#fff;border-left:1px solid #E5E7EB;padding:16px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;}
.info-section{font-size:10px;font-weight:600;color:#9CA3AF;text-transform:uppercase;letter-spacing:0.7px;margin-bottom:6px;}
.info-card{background:#F9FAFB;border-radius:8px;padding:10px 12px;}
.info-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;}
.info-label{color:#9CA3AF;}
.info-val{color:#111827;font-weight:500;text-align:right;}
.status-btn{width:100%;padding:6px;border-radius:8px;font-size:11px;font-weight:500;border:none;cursor:pointer;font-family:inherit;margin-bottom:4px;}
.btn-open{background:#FEF3C7;color:#92400E;}
.btn-resolve{background:#DCFCE7;color:#166534;}
.btn-assign{background:#EEEEFF;color:#5B5FEF;}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sb-logo">Nexdo Inbox</div>
    <div class="sb-ws">
      <select class="ws-select" id="ws-select" onchange="switchWorkspace(this.value)"></select>
    </div>
    <div class="sb-section">Kanallar</div>
    <div class="sb-item active" onclick="filterChannel('all',this)">
      <div class="sb-dot" style="background:#5B5FEF;"></div> Tümü
      <span class="sb-badge" id="badge-all">0</span>
    </div>
    <div class="sb-item" onclick="filterChannel('whatsapp',this)">
      <div class="sb-dot" style="background:#25D366;"></div> WhatsApp
      <span class="sb-badge" id="badge-wa" style="display:none;">0</span>
    </div>
    <div class="sb-item" onclick="filterChannel('instagram',this)">
      <div class="sb-dot" style="background:#E1306C;"></div> Instagram
      <span class="sb-badge" id="badge-ig" style="display:none;">0</span>
    </div>
    <div class="sb-item" onclick="filterChannel('email',this)">
      <div class="sb-dot" style="background:#EA4335;"></div> E-posta
      <span class="sb-badge" id="badge-mail" style="display:none;">0</span>
    </div>
    <div class="sb-section">Görünüm</div>
    <div class="sb-item" onclick="filterStatus('open',this)">📥 Açık</div>
    <div class="sb-item" onclick="filterStatus('assigned',this)">👤 Atanan</div>
    <div class="sb-item" onclick="filterStatus('resolved',this)">✓ Çözülen</div>
    <div class="sb-bottom">
      <div class="sb-user">
        <div class="sb-av" id="sb-av">?</div>
        <div>
          <div class="sb-name" id="sb-name">—</div>
          <div class="sb-role" id="sb-role">—</div>
        </div>
      </div>
      <button class="logout-btn" onclick="doLogout()">Çıkış Yap</button>
    </div>
  </div>

  <!-- INBOX LIST -->
  <div class="inbox-col">
    <div class="inbox-header">
      <span class="inbox-title">Gelen Kutusu</span>
      <span class="inbox-count" id="conv-count">0 konuşma</span>
    </div>
    <div class="inbox-search">
      <input id="search-input" placeholder="Konuşma ara..." oninput="renderConvList()"/>
    </div>
    <div class="inbox-filters">
      <button class="filter-pill active" onclick="filterStatus('all',this)">Tümü</button>
      <button class="filter-pill" onclick="filterStatus('open',this)">Açık</button>
      <button class="filter-pill" onclick="filterStatus('assigned',this)">Atanan</button>
      <button class="filter-pill" onclick="filterStatus('resolved',this)">Çözülen</button>
    </div>
    <div class="inbox-list" id="conv-list">
      <div class="empty-state">
        <div class="empty-icon">📭</div>
        <div>Henüz konuşma yok</div>
      </div>
    </div>
  </div>

  <!-- CHAT AREA -->
  <div class="chat-col" id="chat-col">
    <div class="no-conv" id="no-conv">
      <div class="no-conv-icon">💬</div>
      <div style="font-size:15px;font-weight:500;color:#6B7280;">Bir konuşma seçin</div>
      <div style="font-size:13px;">Sol taraftan konuşma seçerek başlayın</div>
    </div>
    <div id="chat-area" style="display:none;flex:1;display:none;flex-direction:column;">
      <div class="chat-header">
        <div class="chat-av" id="chat-av">?</div>
        <div class="chat-info">
          <div class="chat-name" id="chat-name">—</div>
          <div class="chat-sub" id="chat-sub">—</div>
        </div>
        <div class="chat-actions">
          <button class="act-btn" onclick="assignConv()">Ata</button>
          <button class="act-btn resolve" onclick="resolveConv()">✓ Çöz</button>
        </div>
      </div>
      <div class="chat-msgs" id="chat-msgs"></div>
      <div class="chat-input">
        <textarea id="chat-textarea" rows="2" placeholder="Yanıt yaz..." onkeydown="inputKeyDown(event)"></textarea>
        <button class="send-btn" onclick="sendMessage()">Gönder</button>
      </div>
    </div>
  </div>

  <!-- INFO COL -->
  <div class="info-col" id="info-col" style="display:none;">
    <div>
      <div class="info-section">Müşteri</div>
      <div class="info-card">
        <div class="info-row"><span class="info-label">Ad</span><span class="info-val" id="inf-name">—</span></div>
        <div class="info-row"><span class="info-label">Kanal</span><span class="info-val" id="inf-channel">—</span></div>
        <div class="info-row"><span class="info-label">Durum</span><span class="info-val" id="inf-status">—</span></div>
      </div>
    </div>
    <div>
      <div class="info-section">İşlem</div>
      <button class="status-btn btn-assign" onclick="assignConv()">👤 Ata</button>
      <button class="status-btn btn-resolve" onclick="resolveConv()">✓ Çöz</button>
      <button class="status-btn btn-open" onclick="reopenConv()">↩ Yeniden Aç</button>
    </div>
    <div>
      <div class="info-section">İstatistik</div>
      <div class="info-card">
        <div class="info-row"><span class="info-label">Mesaj</span><span class="info-val" id="inf-msgcount">—</span></div>
        <div class="info-row"><span class="info-label">Açılış</span><span class="info-val" id="inf-date">—</span></div>
      </div>
    </div>
  </div>

</div>

<script>
const SURL='https://aqonfhxwzpxtyqecfddi.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFxb25maHh3enB4dHlxZWNmZGRpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgzMTYxODEsImV4cCI6MjA5Mzg5MjE4MX0.ZsELQEi3pHKjZb2A_TbbyE4Kzi-AaDxS41hg4o3UxtA';
const sb=supabase.createClient(SURL,SKEY);

let user=null, member=null, workspaces=[], conversations=[], messages=[];
let activeWsId=null, activeConvId=null, channelFilter='all', statusFilter='all';

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='/login.html';return;}
  user=session.user;

  // Kullanıcı bilgisi
  const name=user.user_metadata?.full_name||user.email;
  document.getElementById('sb-name').textContent=name;
  document.getElementById('sb-av').textContent=name.charAt(0).toUpperCase();

  // Üyelikleri çek
  const {data:members}=await sb.from('members')
    .select('role,workspace_id')
    .eq('user_id',user.id)
    .eq('status','active');

  if(!members||members.length===0){
    document.getElementById('sb-role').textContent='Üyelik bulunamadı';
    return;
  }

  member=members[0];
  document.getElementById('sb-role').textContent=member.role;

  // Workspace'leri çek
  const wsIds=members.map(m=>m.workspace_id);
  const {data:wsList}=await sb.from('workspaces')
    .select('id,name')
    .in('id',wsIds);

  workspaces=wsList||[];
  const sel=document.getElementById('ws-select');
  sel.innerHTML=workspaces.map(w=>`<option value="${w.id}">${w.name}</option>`).join('');

  activeWsId=workspaces[0]?.id;
  if(activeWsId) loadConversations();
}

async function switchWorkspace(wsId){
  activeWsId=wsId;
  activeConvId=null;
  document.getElementById('no-conv').style.display='flex';
  document.getElementById('chat-area').style.display='none';
  document.getElementById('info-col').style.display='none';
  loadConversations();
}

async function loadConversations(){
  const {data}=await sb.from('conversations')
    .select('*')
    .eq('workspace_id',activeWsId)
    .order('last_message_at',{ascending:false});
  conversations=data||[];
  renderConvList();
}

function renderConvList(){
  const search=document.getElementById('search-input').value.toLowerCase();
  let filtered=conversations;
  if(channelFilter!=='all') filtered=filtered.filter(c=>c.channel_type===channelFilter);
  if(statusFilter!=='all') filtered=filtered.filter(c=>c.status===statusFilter);
  if(search) filtered=filtered.filter(c=>(c.contact_name||'').toLowerCase().includes(search));

  document.getElementById('conv-count').textContent=filtered.length+' konuşma';

  if(filtered.length===0){
    document.getElementById('conv-list').innerHTML='<div class="empty-state"><div class="empty-icon">📭</div><div>Konuşma bulunamadı</div></div>';
    return;
  }

  const colors={'whatsapp':'#25D366','instagram':'#E1306C','email':'#EA4335'};
  const tags={'whatsapp':'WA','instagram':'IG','email':'Mail'};
  const tagClass={'whatsapp':'ch-wa','instagram':'ch-ig','email':'ch-mail'};

  document.getElementById('conv-list').innerHTML=filtered.map(c=>`
    <div class="conv-item${c.id===activeConvId?' active':''}" onclick="openConv('${c.id}')">
      <div class="conv-top">
        <div class="conv-av" style="background:${colors[c.channel_type]||'#9CA3AF'};">
          ${(c.contact_name||'?').charAt(0).toUpperCase()}
        </div>
        <div class="conv-info">
          <div class="conv-name">${c.contact_name||'Bilinmeyen'}<span class="conv-time">${fmtTime(c.last_message_at)}</span></div>
          <div class="conv-preview">${c.status==='resolved'?'✓ Çözüldü':'Mesaj bekleniyor...'}</div>
        </div>
      </div>
      <div class="conv-meta">
        <span class="ch-tag ${tagClass[c.channel_type]||''}">${tags[c.channel_type]||c.channel_type}</span>
        ${c.status==='open'?'<div class="unread"></div>':''}
      </div>
    </div>
  `).join('');
}

async function openConv(convId){
  activeConvId=convId;
  const conv=conversations.find(c=>c.id===convId);
  if(!conv)return;

  // UI güncelle
  document.getElementById('no-conv').style.display='none';
  document.getElementById('chat-area').style.display='flex';
  document.getElementById('chat-area').style.flexDirection='column';
  document.getElementById('info-col').style.display='flex';

  const colors={'whatsapp':'#25D366','instagram':'#E1306C','email':'#EA4335'};
  document.getElementById('chat-av').style.background=colors[conv.channel_type]||'#9CA3AF';
  document.getElementById('chat-av').textContent=(conv.contact_name||'?').charAt(0).toUpperCase();
  document.getElementById('chat-name').textContent=conv.contact_name||'Bilinmeyen';
  document.getElementById('chat-sub').textContent=(conv.channel_type||'').toUpperCase()+' · '+conv.status;
  document.getElementById('inf-name').textContent=conv.contact_name||'—';
  document.getElementById('inf-channel').textContent=conv.channel_type||'—';
  document.getElementById('inf-status').textContent=conv.status||'—';
  document.getElementById('inf-date').textContent=fmtDate(conv.created_at);

  renderConvList();
  loadMessages(convId);
}

async function loadMessages(convId){
  const {data}=await sb.from('messages')
    .select('*')
    .eq('conversation_id',convId)
    .order('created_at',{ascending:true});
  messages=data||[];
  document.getElementById('inf-msgcount').textContent=messages.length;
  renderMessages();
}

function renderMessages(){
  if(messages.length===0){
    document.getElementById('chat-msgs').innerHTML='<div style="text-align:center;color:#9CA3AF;padding:40px;font-size:13px;">Henüz mesaj yok</div>';
    return;
  }
  document.getElementById('chat-msgs').innerHTML=messages.map(m=>`
    <div class="msg-wrap${m.direction==='outbound'?' out':''}">
      <div class="msg-av" style="background:${m.direction==='outbound'?'#5B5FEF':'#E5E7EB'};color:${m.direction==='outbound'?'#fff':'#6B7280'};">
        ${m.direction==='outbound'?'S':'M'}
      </div>
      <div>
        <div class="msg-bubble">${m.body||''}</div>
        <div class="msg-time">${fmtTime(m.created_at)}</div>
      </div>
    </div>
  `).join('');
  const el=document.getElementById('chat-msgs');
  el.scrollTop=el.scrollHeight;
}

async function sendMessage(){
  const ta=document.getElementById('chat-textarea');
  const body=ta.value.trim();
  if(!body||!activeConvId)return;
  ta.value='';
  await sb.from('messages').insert({
    conversation_id:activeConvId,
    sent_by:user.id,
    body,
    direction:'outbound',
    channel_type:conversations.find(c=>c.id===activeConvId)?.channel_type
  });
  await sb.from('conversations').update({last_message_at:new Date().toISOString()}).eq('id',activeConvId);
  loadMessages(activeConvId);
  loadConversations();
}

async function resolveConv(){
  if(!activeConvId)return;
  await sb.from('conversations').update({status:'resolved',resolved_by:user.id,resolved_at:new Date().toISOString()}).eq('id',activeConvId);
  loadConversations();
  openConv(activeConvId);
}

async function reopenConv(){
  if(!activeConvId)return;
  await sb.from('conversations').update({status:'open'}).eq('id',activeConvId);
  loadConversations();
  openConv(activeConvId);
}

function assignConv(){alert('Atama özelliği yakında!');}

function filterChannel(ch,el){
  channelFilter=ch;
  document.querySelectorAll('.sidebar .sb-item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  renderConvList();
}

function filterStatus(s,el){
  statusFilter=s;
  document.querySelectorAll('.inbox-filters .filter-pill').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
  renderConvList();
}

function inputKeyDown(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}}

async function doLogout(){
  await sb.auth.signOut();
  window.location.href='/login.html';
}

function fmtTime(ts){
  if(!ts)return'';
  const d=new Date(ts),now=new Date();
  if(d.toDateString()===now.toDateString())return d.toLocaleTimeString('tr',{hour:'2-digit',minute:'2-digit'});
  return d.toLocaleDateString('tr',{day:'2-digit',month:'2-digit'});
}

function fmtDate(ts){
  if(!ts)return'—';
  return new Date(ts).toLocaleDateString('tr',{day:'2-digit',month:'2-digit',year:'numeric'});
}

init();
